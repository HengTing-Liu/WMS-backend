spring:
  profiles:
    active: dev
  application:
    name: @artifactId@
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:10.201.0.37:8848}
        namespace: ${NACOS_NAMESPACE:04f30753-0fc4-43a0-b48c-e72b37f32397}
        file-extension: yaml
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        prefix: ${spring.application.name}
        import-check:
          enabled: true
        enabled: true
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:10.201.0.37:8848}
        namespace: ${NACOS_NAMESPACE:04f30753-0fc4-43a0-b48c-e72b37f32397}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        enabled: true
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
      - optional:nacos:common.yaml

  # ✅ 数据源配置移动到正确的位置
  datasource:
    master:
      initialize: false
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.p6spy.engine.spy.P6SpyDriver
      jdbc-url: jdbc:p6spy:mysql://${DATASOURCE_HOST:10.201.0.34:3306}/wms?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
      username: ${DATASOURCE_USER_NAME:test}
      password: ${DATASOURCE_PASSWORD:Test123!@#}
    slave:
      initialize: false
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${DATASOURCE_HOST:10.201.0.34:3306}/wms?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
      username: ${DATASOURCE_USER_NAME:test}
      password: ${DATASOURCE_PASSWORD:Test123!@#}

    druid:
      initial-size: 5
      min-idle: 2
      max-active: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      validation-query: SELECT 1
      test-on-borrow: false
      test-while-idle: true

  # ✅ Redis 配置也移动到正确的位置
  redis:
    host: ${REDIS_HOST:10.201.0.34}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:6sGR7hauY9QajFEkR3GR}
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    relaxed-query-chars: "[,]"

# MyBatis 配置（只保留 MyBatis 相关配置）
mybatis:
  mapper-locations: classpath:mapper/**/*Mapper.xml
  type-aliases-package: com.abclonal.product.dao.**.entity
  configLocation: classpath:mybatis/mybatis-config.xml

# 日志配置
logging:
  config: classpath:logback.xml
  level:
    com.alibaba: WARN
    org.apache.dubbo: WARN
    org.springframework: INFO
    com.abclonal.product.dao: DEBUG
#    org.mybatis: DEBUG

debug: false

feign:
  client:
    config:
      default:
        connectTimeout: 5000    # 连接超时时间
        readTimeout: 10000      # 读取超时时间
        loggerLevel: full       # 日志级别

rocketmq:
  enabled: true
  name-server: 10.201.0.37:9876
  producer:
    group: ${spring.application.name}-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    max-message-size: 4096

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

xxl:
  job:
    admin:
      addresses: http://10.201.0.37:8080/xxl-job-admin
    executor:
      appname: @artifactId@         # 执行器AppName（必须与admin中注册的一致）
      ip:                        # 可选，自动注册IP；若在NAT/容器环境需手动指定
      port: 9999                        # 执行器通信端口（非Web端口！）
      logpath: /data/logs/xxl-job/jobhandler  # 日志路径（建议挂载到宿主机）
      logretentiondays: 30              # 日志保留天数
    accessToken: ""                     # 若admin设置了accessToken，需保持一致